name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Contracts: compile + unit + integration tests ───────────────────────
  contracts:
    name: Contracts — compile & test (v3.4)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run unit tests (Hardhat Network)
        run: npx hardhat test test/unit/*.test.ts --network hardhat
        continue-on-error: false

      - name: Run integration tests (Hardhat Network)
        run: npx hardhat test test/integration/*.test.ts --network hardhat
        continue-on-error: false

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contracts-test-results
          path: contracts/test-results
          if-no-files-found: warn

  # ─── Contracts: test on Polkadot node ────────────────────────────────────
  contracts-polkadot:
    name: Contracts — test on Polkadot node
    runs-on: ubuntu-latest
    needs: contracts

    defaults:
      run:
        working-directory: ./contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies
        run: npm ci --force

      - name: Download / Prepare anvil-polkadot node
        run: bash scripts/setup-node.sh

      - name: Polkadot node smoke test (gating)
        run: |
          cat > /tmp/polkadot-smoke.js <<'EOF'
          async function main() {
            const { ethers } = require("hardhat");
            const network = await ethers.provider.getNetwork();
            const block = await ethers.provider.getBlockNumber();
            const signers = await ethers.getSigners();
            const bal = await ethers.provider.getBalance(signers[0].address);
            console.log(
              `chainId=${network.chainId} block=${block} signer=${signers[0].address} balance=${bal}`
            );
          }
          main().catch((e) => {
            console.error(e);
            process.exit(1);
          });
          EOF
          npx hardhat run /tmp/polkadot-smoke.js --network hardhat --no-compile
        env:
          POLKADOT_NODE: "true"

      - name: Run unit tests on Polkadot node (non-blocking report)
        run: |
          mkdir -p test-results-polkadot
          set -o pipefail
          npx hardhat test test/unit/*.test.ts --network hardhat 2>&1 | tee test-results-polkadot/unit.log
        env:
          POLKADOT_NODE: "true"
        continue-on-error: true

      - name: Run integration tests on Polkadot node (non-blocking report)
        run: |
          mkdir -p test-results-polkadot
          set -o pipefail
          npx hardhat test test/integration/*.test.ts --network hardhat 2>&1 | tee test-results-polkadot/integration.log
        env:
          POLKADOT_NODE: "true"
        continue-on-error: true

      - name: Upload polkadot-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contracts-polkadot-test-results
          path: contracts/test-results-polkadot
          if-no-files-found: warn

  # ─── Frontend: lint + type-check + build ────────────────────────────────
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Type check
        run: npx tsc -b

      - name: Unit tests
        run: npx jest --ci --coverage

      - name: Build
        run: npx vite build
