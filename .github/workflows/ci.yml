name: CI

on:
  push:
    branches: [main, dev, firstVersion]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    name: Contracts — compile & test
    runs-on: ubuntu-latest
  
    defaults:
      run:
        working-directory: ./contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for contracts)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies (contracts)
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run unit tests (Hardhat Network)
      
        run: npx hardhat test --network hardhat
        
        continue-on-error: false

      - name: Upload test artifacts (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contracts-test-results
          
          path: contracts/test-results
          if-no-files-found: warn

  contracts-polkadot:
    name: Contracts — test on Polkadot node
    runs-on: ubuntu-latest
    
    needs: contracts
    defaults:
      run:
        working-directory: ./contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (for polkadot tests)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Install dependencies (contracts)
        run: npm ci

      - name: Download / Prepare anvil-polkadot node
       
        run: bash scripts/setup-node.sh

      - name: Run tests (anvil-polkadot)
        run: npx hardhat test --network localhost
        env:
          POLKADOT_NODE: "true"
       
        continue-on-error: false

      - name: Upload polkadot-test artifacts (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contracts-polkadot-test-results
          path: contracts/test-results-polkadot
          if-no-files-found: warn

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Type check
        run: npx tsc -b

      - name: Build
        run: npx vite build