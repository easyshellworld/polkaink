name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Contracts: compile + unit + integration tests ───────────────────────
  contracts:
    name: Contracts — compile & test (v3.4)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - name: Check for package-lock.json
        run: |
          if [ ! -f package-lock.json ]; then
            echo "⚠️ package-lock.json not found, generating from package.json"
            npm install --package-lock-only
          fi

      - name: Install dependencies
        run: npm install

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run unit tests (Hardhat Network)
        run: npx hardhat test test/unit/*.test.ts --network hardhat
        continue-on-error: false

      - name: Run integration tests (Hardhat Network)
        run: npx hardhat test test/integration/*.test.ts --network hardhat
        continue-on-error: false

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contracts-test-results
          path: test-results
          if-no-files-found: warn



  # ─── Frontend: lint + type-check + build ────────────────────────────────
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Type check
        run: npx tsc -b

      - name: Unit tests
        run: npx jest --ci --coverage

      - name: Build
        run: npx vite build
