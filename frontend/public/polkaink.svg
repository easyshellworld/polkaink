<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4fa3"></stop>
      <stop offset="100%" stop-color="#ff007a"></stop>
    </linearGradient>

    <linearGradient id="nibGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f4f5"></stop>
      <stop offset="100%" stop-color="#c7c7cc"></stop>
    </linearGradient>
  </defs>

  <!-- chain circle -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#9b5cff" stroke-width="10" stroke-dasharray="10 16" stroke-linecap="round"></circle>

  <!-- nodes -->
  <circle cx="128" cy="18" r="9" fill="#ff2a8b"></circle>
  <circle cx="238" cy="128" r="9" fill="#9b5cff"></circle>
  <circle cx="128" cy="238" r="9" fill="#ff2a8b"></circle>
  <circle cx="18" cy="128" r="9" fill="#9b5cff"></circle>

  <!-- cap -->
  <rect x="110" y="20" width="36" height="60" rx="14" fill="url(#bodyGrad)"></rect>

  <!-- clip -->
  <path d="M128 26 C150 50 150 70 128 90" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"></path>

  <!-- barrel -->
  <rect x="110" y="80" width="36" height="90" rx="18" fill="url(#bodyGrad)"></rect>

  <!-- ring -->
  <rect x="110" y="95" width="36" height="10" fill="white" opacity="0.95"></rect>

  <!-- grip -->
  <rect x="110" y="170" width="36" height="20" rx="8" fill="#ff2a8b"></rect>

  <!-- ▼ 倒三角笔尖 -->
  <polygon points="128,240 156,195 100,195" fill="url(#nibGrad)"></polygon>

  <!-- slit -->
  <line x1="128" y1="198" x2="128" y2="235" stroke="#9b9ba1" stroke-width="3" stroke-linecap="round"></line>

  <!-- hole -->
  <circle cx="128" cy="205" r="4" fill="#9b9ba1"></circle>

  <!-- highlight -->
  <rect x="120" y="90" width="8" height="70" rx="4" fill="white" opacity="0.25"></rect>

</svg>